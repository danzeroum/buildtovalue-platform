# EXEMPLO de server block para o `global-ingress-gateway` da VPS (NÃO subimos
# nginx próprio). Plugue no gateway de UMA das duas formas (ver deploy-vps.md):
#   (a) rede docker compartilhada  → proxy_pass http://api:3000;
#   (b) porta no host              → proxy_pass http://127.0.0.1:${API_HOST_PORT};
# Troque `SEU_DOMINIO`, o caminho do console e o upstream conforme a forma.

upstream btv_api {
    # (b) porta no host (compose prende a api em 127.0.0.1:API_HOST_PORT):
    server 127.0.0.1:3000;
    # (a) rede compartilhada com o gateway: comente acima e use:
    # server api:3000;
}

server {
    listen 443 ssl;
    server_name SEU_DOMINIO;

    # ... ssl_certificate / ssl_certificate_key do seu gateway ...

    # Console = build ESTÁTICO (gerado no CI, copiado para o host). SPA:
    # try_files cai no index.html para as rotas do react-router.
    root /var/www/buildtovalue;   # diretório do host servido pelo gateway
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: /v1 /health /ready → upstream, propagando o X-Request-Id.
    location ~ ^/(v1|health|ready)(/|$) {
        proxy_pass http://btv_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Correlação: repassa o X-Request-Id do cliente; a api ecoa o dela na resposta.
        proxy_set_header X-Request-Id $http_x_request_id;
        proxy_pass_header X-Request-Id;
    }
}
